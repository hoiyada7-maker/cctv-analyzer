name: Release

# v로 시작하는 태그를 푸시하면 (예: v1.0.0) 자동으로 릴리스 생성
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true   # 커밋 기록으로 릴리스 노트 자동 생성
